name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Many color libraries just need this to be set to any value, but at least
  # one distinguishes color depth, where "3" -> "256-bit color".
  FORCE_COLOR: 3

jobs:
  pre-commit:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.70.2
          cache: true
          cache-key: dev
          cache-write:
            ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          environments: dev

      - name: Run pre-commit
        run: pixi run pre-commit --hook-stage manual

      - name: Run PyLint
        run: pixi run pylint --output-format=github

  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.70.2
          cache: true
          cache-key: dev-${{ github.ref_name }}
          cache-write:
            ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          environments: dev

      - name: Build and check package
        run: pixi run build-check

  checks:
    name:
      Check Python ${{ matrix.python-version }} (${{ matrix.variant }}) on ${{
      matrix.runs-on }}
    runs-on: ${{ matrix.runs-on }}
    needs: [pre-commit]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        runs-on: [ubuntu-latest, windows-latest, macos-14]
        variant: [default]
        include:
          # Default
          - python-version: "3.12"
            variant: default
            pixi-environment: py312
          - python-version: "3.13"
            variant: default
            pixi-environment: py313
          - python-version: "3.14"
            variant: default
            pixi-environment: py314

          # JAX
          - python-version: "3.14"
            runs-on: ubuntu-latest
            variant: jax
            pixi-environment: py314-jax

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.70.2
          cache: true
          cache-key: ${{ matrix.pixi-environment }}-${{ github.ref_name }}
          cache-write:
            ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          environments: ${{ matrix.pixi-environment }}

      - name: Test package
        run: >-
          pixi run -e ${{ matrix.pixi-environment }} test-all -ra --cov-branch
          --cov-report=xml --cov-report=term --junitxml=junit.xml -o
          junit_family=legacy --durations=20

      - name: Test docs
        if: matrix.variant == 'jax'
        env:
          JAX_PLATFORMS: "cpu" # for jax-related tests
        run: |
          pixi run -e ${{ matrix.pixi-environment }} test-docs
          pixi run -e ${{ matrix.pixi-environment }} test-docstrings

      - name: Upload coverage report
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  hs3testsuite:
    name: HS3TestSuite conformance (Python 3.12)
    runs-on: ubuntu-latest
    needs: [pre-commit]
    env:
      HS3TESTSUITE_ROOT: ${{ github.workspace }}/.hs3testsuite

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check out pinned HS3TestSuite
        uses: actions/checkout@v7
        with:
          repository: hep-statistics-serialization-standard/HS3TestSuite
          ref: 9d04e321ae6fddd283a35507f14ecf852eb7df61
          path: .hs3testsuite
          persist-credentials: false

      - name: Configure temporary test directories
        shell: bash
        run: |
          echo "HS3TESTSUITE_REPORT_DIR=$RUNNER_TEMP/hs3suite-reports" >> "$GITHUB_ENV"
          echo "PYTENSOR_FLAGS=base_compiledir=$RUNNER_TEMP/hs3suite-pytensor" >> "$GITHUB_ENV"

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.70.2
          cache: true
          cache-key: py312-${{ github.ref_name }}
          cache-write:
            ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          environments: py312

      - name: Run HS3TestSuite conformance tests
        run: |
          mkdir -p "$HS3TESTSUITE_REPORT_DIR"
          pixi run -e py312 test-hs3suite \
            --junitxml="$HS3TESTSUITE_REPORT_DIR/junit.xml" \
            -o junit_family=legacy

      - name: Add HS3TestSuite summary
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          if [[ -f "$HS3TESTSUITE_REPORT_DIR/hs3suite-summary.md" ]]; then
            cat "$HS3TESTSUITE_REPORT_DIR/hs3suite-summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload HS3TestSuite reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: hs3testsuite-reports
          path: ${{ runner.temp }}/hs3suite-reports
          if-no-files-found: warn
