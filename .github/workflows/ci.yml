name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Many color libraries just need this to be set to any value, but at least
  # one distinguishes color depth, where "3" -> "256-bit color".
  FORCE_COLOR: 3

jobs:
  pre-commit:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.59.0
          cache: true
          cache-key: dev
          cache-write:
            ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          environments: dev

      - name: Run pre-commit
        run: pixi run pre-commit --hook-stage manual

      - name: Run PyLint
        run: pixi run pylint --output-format=github

  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.59.0
          cache: true
          cache-key: dev-${{ github.ref_name }}
          cache-write:
            ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          environments: dev

      - name: Build and check package
        run: pixi run build-check

  checks:
    name:
      Check Python ${{ matrix.python-version }} (${{ matrix.variant }}) on ${{
      matrix.runs-on }}
    runs-on: ${{ matrix.runs-on }}
    needs: [pre-commit]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.13", "3.14"]
        runs-on: [ubuntu-latest, windows-latest, macos-14]
        variant: [default]
        include:
          # Default / PyTensor 2
          - python-version: "3.10"
            variant: default
            pixi-environment: py310
          - python-version: "3.11"
            variant: default
            pixi-environment: py311
          - python-version: "3.13"
            variant: default
            pixi-environment: py313
          - python-version: "3.14"
            variant: default
            pixi-environment: py314

          # JAX / PyTensor 2
          - python-version: "3.13"
            runs-on: ubuntu-latest
            variant: jax
            pixi-environment: py313-jax
          - python-version: "3.13"
            runs-on: macos-14
            variant: jax
            pixi-environment: py313-jax

          # PyTensor 3 (Linux only)
          - python-version: "3.12"
            runs-on: ubuntu-latest
            variant: pytensor3
            pixi-environment: py312-pytensor3
          - python-version: "3.14"
            runs-on: ubuntu-latest
            variant: pytensor3
            pixi-environment: py314-pytensor3

          # JAX / PyTensor 3
          - python-version: "3.14"
            runs-on: ubuntu-latest
            variant: pytensor3-jax
            pixi-environment: py314-pytensor3-jax

        exclude:
          - runs-on: windows-latest
            python-version: "3.10"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.59.0
          cache: true
          cache-key: ${{ matrix.pixi-environment }}-${{ github.ref_name }}
          cache-write:
            ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          environments: ${{ matrix.pixi-environment }}

      - name: Test package
        run: >-
          pixi run -e ${{ matrix.pixi-environment }} test-all -ra --cov-branch
          --cov-report=xml --cov-report=term --junitxml=junit.xml -o
          junit_family=legacy --durations=20

      - name: Test docs
        if: matrix.python-version == '3.13' && contains(matrix.variant, 'jax')
        env:
          JAX_PLATFORMS: "cpu" # for jax-related tests
        run: |
          pixi run -e ${{ matrix.pixi-environment }} test-docs
          pixi run -e ${{ matrix.pixi-environment }} test-docstrings

      - name: Upload coverage report
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
